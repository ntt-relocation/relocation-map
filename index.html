<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NTT 支障移転位置確認</title>

  <!-- ✅ 正しい読み込み -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>NTT 支障移転位置確認システム</h2>

<div class="card">
  <input type="text" id="address" placeholder="住所を入力">
  <button onclick="searchAddress()">住所検索</button>
</div>

<div class="card">
  <button onclick="setPole()">📍 電柱を置く</button>
  <button onclick="enableRoadDirectionMode()">➡ 道路方向</button>
</div>

<div class="card">
  <strong>移設量入力</strong><br><br>

  道路方向：
  <input type="number" id="inputX" step="0.1"> m　

  民地方向：
  <input type="number" id="inputY" step="0.1"> m

  <br><br>

  <button onclick="applyXYMove()">配置</button>
  <button onclick="resetXY()">リセット</button>
</div>

<div class="card">
  <button class="send-btn" onclick="saveAndSend()">保存して送信</button>
</div>

<div id="distanceInfo"></div>
<div id="xyInfo"></div>

<div id="map"></div>

<!-- ✅ 正しい -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
